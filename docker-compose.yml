services:
  ollama:
    image: ollama/ollama:latest
    container_name: photo-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      # Mapea el puerto del host dinámico al puerto interno fijo de Ollama
      - "${PORT_OLLAMA_HOST}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  organizer-service:
    build: .
    container_name: photo-organizer-app
    restart: unless-stopped
    ports:
      - "${PORT_ORGANIZER_HOST}:8000"
    environment:
      # CRUCIAL: Aquí se comunican por la red interna de Docker. 
      # Se usa el nombre del servicio 'ollama' y su puerto interno '11434'.
      - OLLAMA_HOST=http://ollama:11434
      - MODELO_VLM=${MODELO_VLM}
      - CARPETA_ORIGEN=/data/origen
      - CARPETA_DESTINO=/data/destino
      - UMBRAL_HORAS_CLUSTER=${UMBRAL_HORAS_CLUSTER}
      - MIN_FOTOS_EVENTO=${MIN_FOTOS_EVENTO}
    volumes:
      - ${RUTA_FOTOS_ORIGEN}:/data/origen
      - ${RUTA_FOTOS_DESTINO}:/data/destino
    depends_on:
      - ollama

volumes:
  ollama_data: